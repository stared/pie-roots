<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>pie-roots</title>
    <meta name="robots" content="noindex" />
    <script>
      // the charts moved to one path per root; forward old #view URLs,
      // keeping any query (?share).
      const MAP = { see: "weyd", know: "weyd-magic", speak: "bheh2", sit: "sed", turn: "kwel" };
      const slug = MAP[location.hash.slice(1)] ?? "weyd";
      location.replace(`./${slug}/${location.search}`);
    </script>
    <!-- Privacy-friendly analytics (Plausible), counted under the p.migdal.pl property. -->
    <script
      defer
      data-domain="p.migdal.pl"

    ></script>
